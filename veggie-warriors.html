<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veggie Warriors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    #wrap { position: relative; display: inline-block; }
    canvas {
      display: block;
      border: 2px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,255,136,0.3);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      background: rgba(5, 8, 15, 0.96);
      border: 2px solid #00ff88;
      border-radius: 14px;
      padding: 36px 48px;
      color: white;
      pointer-events: all;
      min-width: 360px;
      box-shadow: 0 0 30px rgba(0,255,136,0.2);
    }
    .screen.active { display: flex; }
    h1 { font-size: 2.2em; color: #00ff88; margin-bottom: 8px; text-align: center; }
    h2 { font-size: 1.5em; color: #ffdd00; margin-bottom: 12px; }
    .subtitle { color: #888; font-size: 0.9em; margin-bottom: 24px; }
    .btn {
      background: #00ff88;
      color: #0d1117;
      border: none;
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 1.05em;
      font-weight: bold;
      cursor: pointer;
      margin: 6px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0,255,136,0.6); }
    .btn.secondary {
      background: transparent;
      color: #00ff88;
      border: 1.5px solid #00ff88;
    }
    .hero-choice { display: flex; gap: 16px; margin: 16px 0 24px; }
    .hero-btn {
      font-size: 2.8em;
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 22px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .hero-btn span { font-size: 0.28em; color: #aaa; font-family: Arial, sans-serif; }
    .hero-btn:hover, .hero-btn.selected {
      border-color: #00ff88;
      background: rgba(0,255,136,0.12);
      box-shadow: 0 0 12px rgba(0,255,136,0.4);
    }
    .instructions { color: #666; font-size: 0.85em; margin-bottom: 20px; line-height: 1.8; text-align: center; }
    #hud {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 20px;
      pointer-events: none;
    }
    .hud-pill {
      background: rgba(5,8,15,0.85);
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 20px;
      padding: 4px 14px;
      color: #00ff88;
      font-size: 0.9em;
      font-weight: bold;
      white-space: nowrap;
    }
    .hud-pill span { color: white; }
    input[type="text"] {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid #00ff88;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      width: 220px;
      text-align: center;
      margin: 10px 0;
    }
    #finalStats { color: #ffdd00; font-size: 1.6em; margin: 8px 0; }
    #finalLevel { color: #888; font-size: 1em; margin-bottom: 20px; }
    .lb-table { width: 100%; border-collapse: collapse; margin-top: 8px; min-width: 380px; }
    .lb-table th { color: #00ff88; padding: 8px 10px; border-bottom: 1px solid rgba(0,255,136,0.3); font-size: 0.85em; text-align: center; }
    .lb-table td { color: #ddd; padding: 7px 10px; text-align: center; font-size: 0.9em; }
    .lb-table tr:nth-child(even) td { background: rgba(255,255,255,0.04); }
    .gold   { color: #ffd700 !important; }
    .silver { color: #c0c0c0 !important; }
    .bronze { color: #cd7f32 !important; }
    .empty-lb { color: #555; text-align: center; padding: 24px 0; font-size: 0.9em; }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-pill">Score: <span id="hScore">0</span></div>
    <div class="hud-pill">Level: <span id="hLevel">1</span></div>
    <div class="hud-pill">Progress: <span id="hProg">0</span> / 10</div>
  </div>

  <div id="overlay">

    <!-- START SCREEN -->
    <div class="screen active" id="sStart">
      <h1>🥗 Veggie Warriors</h1>
      <p class="subtitle">Defend the world from the fast food invasion!</p>
      <h2>Choose Your Hero</h2>
      <div class="hero-choice">
        <button class="hero-btn selected" id="btnBanana" onclick="selectHero('banana')">🍌<span>Banana</span></button>
        <button class="hero-btn" id="btnBroccoli" onclick="selectHero('broccoli')">🥦<span>Broccoli</span></button>
      </div>
      <p class="instructions">
        ↑ ↓ or W S &mdash; move your hero<br>
        Click (or Space) &mdash; throw sword toward cursor<br>
        Hit 10 fast foods to advance a level!
      </p>
      <button class="btn" onclick="startGame()">▶ PLAY</button>
      <button class="btn secondary" onclick="openLeaderboard()">🏆 Leaderboard</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen" id="sGameOver">
      <h1>💀 Game Over!</h1>
      <div id="finalStats"></div>
      <div id="finalLevel"></div>
      <input type="text" id="nameInput" placeholder="Your name" maxlength="15">
      <button class="btn" onclick="saveScore()">💾 Save Score</button>
      <button class="btn secondary" onclick="showScreen('sStart')">← Main Menu</button>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div class="screen" id="sLeaderboard">
      <h1>🏆 Leaderboard</h1>
      <div id="lbContent"></div>
      <button class="btn secondary" style="margin-top:20px" onclick="showScreen('sStart')">← Back</button>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W      = canvas.width  = 900;
const H      = canvas.height = 540;

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const HERO_SPEED       = 5;
const SWORD_SPEED      = 14;
const SWORD_COOLDOWN   = 18;   // frames between throws
const POINTS_PER_LEVEL = 10;
const HERO_HP          = 5;
const INVINCIBLE_FRAMES = 90;
const SPEED_MULT       = 0.7975;  // 20.25% slower

const ENEMY_DEFS = [
  { emoji: '🍔', name: 'Hamburger', baseHp: 1, baseSpeed: 1.4, size: 44 },
  { emoji: '🌭', name: 'Hot Dog',   baseHp: 1, baseSpeed: 2.0, size: 36 },
  { emoji: '🍕', name: 'Pizza',     baseHp: 2, baseSpeed: 1.1, size: 46 },
  { emoji: '🍟', name: 'Fries',     baseHp: 1, baseSpeed: 2.4, size: 34 },
  { emoji: '🍩', name: 'Donut',     baseHp: 1, baseSpeed: 1.8, size: 36 },
  { emoji: '🌮', name: 'Taco',      baseHp: 2, baseSpeed: 2.1, size: 38 },
  { emoji: '🥤', name: 'Soda',      baseHp: 1, baseSpeed: 3.0, size: 30 },
  { emoji: '🍦', name: 'Ice Cream', baseHp: 3, baseSpeed: 0.9, size: 44 },
];

const HERO_EMOJIS = { banana: '🍌', broccoli: '🥦' };

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let heroType      = 'banana';
let hero          = null;
let enemies       = [];
let swords        = [];
let particles     = [];
let score         = 0;
let level         = 1;
let levelProgress = 0;
let gameRunning   = false;
let frame         = 0;
let lastSpawnFrame = 0;
let swordCd       = 0;
let mouseX        = W / 2;
let mouseY        = H / 2;
let keys          = {};
let levelUpTimer  = 0;   // frames to show "LEVEL UP!" overlay
let animId        = null;

// ═══════════════════════════════════════════════════════════════
//  HERO SELECT
// ═══════════════════════════════════════════════════════════════
function selectHero(type) {
  heroType = type;
  document.getElementById('btnBanana').classList.toggle('selected',   type === 'banana');
  document.getElementById('btnBroccoli').classList.toggle('selected', type === 'broccoli');
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
  document.getElementById('hud').style.display = 'none';
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

function openLeaderboard() {
  renderLeaderboard();
  showScreen('sLeaderboard');
}

// ═══════════════════════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════════════════════
function startGame() {
  score         = 0;
  level         = 1;
  levelProgress = 0;
  frame         = 0;
  lastSpawnFrame = 0;
  swordCd       = 0;
  levelUpTimer  = 0;
  enemies       = [];
  swords        = [];
  particles     = [];

  hero = {
    x: 80,
    y: H / 2,
    size: 52,
    hp: HERO_HP,
    invincible: 0,
  };

  showScreen(null);
  document.getElementById('hud').style.display = 'flex';
  updateHUD();
  gameRunning = true;
  animId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
  if (!gameRunning) return;
  frame++;
  update();
  render();
  animId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════
function update() {
  // Hero movement
  if (keys['ArrowUp']   || keys['w'] || keys['W'])
    hero.y = Math.max(hero.size / 2, hero.y - HERO_SPEED);
  if (keys['ArrowDown'] || keys['s'] || keys['S'])
    hero.y = Math.min(H - hero.size / 2, hero.y + HERO_SPEED);

  if (hero.invincible > 0) hero.invincible--;
  if (swordCd > 0)         swordCd--;
  if (levelUpTimer > 0)    levelUpTimer--;

  // Enemy spawn
  const spawnInterval = Math.max(22, 75 - level * 6);
  if (frame - lastSpawnFrame >= spawnInterval) {
    spawnEnemy();
    if (level >= 4 && Math.random() < 0.4) spawnEnemy();
    if (level >= 7 && Math.random() < 0.3) spawnEnemy();
    lastSpawnFrame = frame;
  }

  // Move swords
  swords = swords.filter(s => {
    s.x  += s.vx;
    s.y  += s.vy;
    s.rot += 0.35;
    return s.x > -40 && s.x < W + 40 && s.y > -40 && s.y < H + 40;
  });

  // Move enemies
  enemies = enemies.filter(e => {
    e.x -= e.speed;
    e.y += Math.sin(frame * 0.05 + e.phase) * e.wobble;
    return e.x > -e.size;
  });

  // Sword ↔ enemy collisions
  const deadSwords  = new Set();
  const deadEnemies = new Set();

  for (let si = 0; si < swords.length; si++) {
    for (let ei = 0; ei < enemies.length; ei++) {
      if (deadSwords.has(si) || deadEnemies.has(ei)) continue;
      const s = swords[si], e = enemies[ei];
      const dx = s.x - e.x, dy = s.y - e.y;
      if (dx * dx + dy * dy < (e.size / 2 + 10) ** 2) {
        e.hp--;
        spawnParticles(e.x, e.y, '#ff8800', 5);
        deadSwords.add(si);
        if (e.hp <= 0) {
          deadEnemies.add(ei);
          spawnExplosion(e.x, e.y);
          score++;
          levelProgress++;
          updateHUD();
          if (levelProgress >= POINTS_PER_LEVEL) doLevelUp();
        }
      }
    }
  }

  swords  = swords.filter((_,  i) => !deadSwords.has(i));
  enemies = enemies.filter((_, i) => !deadEnemies.has(i));

  // Enemy reaches hero
  enemies = enemies.filter(e => {
    if (e.x - e.size / 2 < hero.x + hero.size / 2 && hero.invincible === 0) {
      hero.hp--;
      hero.invincible = INVINCIBLE_FRAMES;
      spawnParticles(hero.x, hero.y, '#ff2244', 12);
      if (hero.hp <= 0) { endGame(); return false; }
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.12;
    p.life--;
    return p.life > 0;
  });
}

// ═══════════════════════════════════════════════════════════════
//  SPAWNING
// ═══════════════════════════════════════════════════════════════
function spawnEnemy() {
  const poolSize = Math.min(ENEMY_DEFS.length, 2 + Math.floor(level / 2));
  const def      = ENEMY_DEFS[Math.floor(Math.random() * poolSize)];
  const speedMult = 1 + (level - 1) * 0.18;
  const extraHp   = Math.floor((level - 1) / 3);

  enemies.push({
    emoji:  def.emoji,
    size:   def.size,
    hp:     def.baseHp + extraHp,
    maxHp:  def.baseHp + extraHp,
    speed:  def.baseSpeed * speedMult * SPEED_MULT,
    x:      W + def.size,
    y:      def.size / 2 + Math.random() * (H - def.size),
    phase:  Math.random() * Math.PI * 2,
    wobble: level >= 3 ? Math.min(3, 0.4 + level * 0.2) : 0,
  });
}

function throwSword() {
  if (swordCd > 0 || !gameRunning) return;
  const angle = Math.atan2(mouseY - hero.y, mouseX - hero.x);
  swords.push({
    x:   hero.x + Math.cos(angle) * 36,
    y:   hero.y + Math.sin(angle) * 36,
    vx:  Math.cos(angle) * SWORD_SPEED,
    vy:  Math.sin(angle) * SWORD_SPEED,
    rot: angle,
  });
  swordCd = SWORD_COOLDOWN;
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playExplosionSound() {
  try {
    const ac       = getAudio();
    const duration = 0.28;
    const sr       = ac.sampleRate;
    const buf      = ac.createBuffer(1, Math.floor(sr * duration), sr);
    const data     = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / data.length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.8);
    }
    const src    = ac.createBufferSource();
    src.buffer   = buf;
    const lpf    = ac.createBiquadFilter();
    lpf.type     = 'lowpass';
    lpf.frequency.value = 420;
    const gain   = ac.createGain();
    gain.gain.setValueAtTime(0.45, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    src.connect(lpf); lpf.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch (_) {}
}

function spawnExplosion(x, y) {
  // Particle burst
  spawnParticles(x, y, '#ffee00', 20);
  spawnParticles(x, y, '#ff6600', 12);
  spawnParticles(x, y, '#ff2200', 8);
  // Expanding shockwave rings
  for (let i = 0; i < 3; i++) {
    const maxLife = 22 - i * 4;
    particles.push({
      x, y, vx: 0, vy: 0,
      life: maxLife, maxLife,
      startR: i * 6, endR: 60 + i * 18,
      ring: true,
      color: i === 0 ? '#ffee00' : '#ff6600',
    });
  }
  playExplosionSound();
}

function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx:   Math.cos(a) * spd,
      vy:   Math.sin(a) * spd - 1.5,
      life: 25 + Math.random() * 20,
      color,
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  LEVEL UP / GAME OVER
// ═══════════════════════════════════════════════════════════════
function doLevelUp() {
  levelProgress = 0;
  level++;
  levelUpTimer = 100;
  spawnParticles(W / 2, H / 2, '#00ff88', 50);
  updateHUD();
}

function endGame() {
  gameRunning = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('finalStats').textContent = `Score: ${score}`;
  document.getElementById('finalLevel').textContent = `Reached Level ${level}`;
  document.getElementById('nameInput').value = '';
  showScreen('sGameOver');
  // keep canvas visible — render last frame
  render();
}

function updateHUD() {
  document.getElementById('hScore').textContent = score;
  document.getElementById('hLevel').textContent = level;
  document.getElementById('hProg').textContent  = levelProgress;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Particles (regular + rings)
  particles.forEach(p => {
    if (p.ring) {
      const progress = 1 - p.life / p.maxLife;
      const r        = p.startR + (p.endR - p.startR) * progress;
      const alpha    = (p.life / p.maxLife) * 0.9;
      ctx.save();
      ctx.globalAlpha  = alpha;
      ctx.strokeStyle  = p.color;
      ctx.lineWidth    = 3 * (p.life / p.maxLife);
      ctx.shadowBlur   = 18;
      ctx.shadowColor  = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.globalAlpha = Math.max(0, p.life / 45);
      ctx.fillStyle   = p.color;
      ctx.shadowBlur  = 6;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;

  // Swords — neon pink/blue flashing
  const swordColor = Math.floor(frame / 6) % 2 === 0 ? '#ff10f0' : '#00efff';
  swords.forEach(s => {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.shadowBlur  = 18;
    ctx.shadowColor = swordColor;
    ctx.strokeStyle = swordColor;
    ctx.fillStyle   = swordColor;
    ctx.lineCap     = 'round';
    // Blade
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(11, 0); ctx.stroke();
    // Tip
    ctx.beginPath(); ctx.moveTo(9, -3); ctx.lineTo(16, 0); ctx.lineTo(9, 3); ctx.closePath(); ctx.fill();
    // Crossguard
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-4, -7); ctx.lineTo(-4, 7); ctx.stroke();
    // Handle
    ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-5, 0); ctx.stroke();
    ctx.restore();
  });
  ctx.shadowBlur = 0;

  // Enemies
  enemies.forEach(e => {
    ctx.save();
    ctx.font         = `${e.size}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.emoji, e.x, e.y);
    // HP bar for tanky enemies
    if (e.maxHp > 1) {
      const bw = e.size, bx = e.x - bw / 2, by = e.y + e.size / 2 + 5;
      ctx.fillStyle = '#440000';
      ctx.fillRect(bx, by, bw, 5);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), 5);
    }
    ctx.restore();
  });

  // Hero
  if (hero) {
    ctx.save();
    if (hero.invincible > 0 && Math.floor(frame / 5) % 2 === 0) {
      ctx.globalAlpha = 0.3;
    }
    ctx.font         = `${hero.size}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(HERO_EMOJIS[heroType], hero.x, hero.y);
    ctx.restore();

    // Aim indicator
    const angle = Math.atan2(mouseY - hero.y, mouseX - hero.x);
    ctx.save();
    ctx.strokeStyle = swordCd > 0 ? 'rgba(255,80,80,0.3)' : 'rgba(0,255,136,0.35)';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([6, 7]);
    ctx.beginPath();
    ctx.moveTo(hero.x + Math.cos(angle) * 34, hero.y + Math.sin(angle) * 34);
    ctx.lineTo(hero.x + Math.cos(angle) * 90, hero.y + Math.sin(angle) * 90);
    ctx.stroke();
    ctx.restore();

    // HP hearts
    ctx.font = '22px serif';
    for (let i = 0; i < HERO_HP; i++) {
      ctx.fillText(i < hero.hp ? '❤️' : '🖤', 22 + i * 30, H - 18);
    }

    // Sword cooldown bar
    if (swordCd > 0) {
      const ratio = 1 - swordCd / SWORD_COOLDOWN;
      ctx.fillStyle = 'rgba(0,255,136,0.5)';
      ctx.fillRect(hero.x - 26, hero.y + hero.size / 2 + 8, 52 * ratio, 4);
    }
  }

  // LEVEL UP overlay
  if (levelUpTimer > 0) {
    const alpha = Math.min(1, levelUpTimer / 18);
    ctx.save();
    ctx.globalAlpha = alpha * 0.88;
    ctx.fillStyle   = '#0d1117';
    ctx.fillRect(0, H / 2 - 60, W, 120);
    ctx.globalAlpha  = alpha;
    ctx.font         = 'bold 62px Arial';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#00ff88';
    ctx.fillText(`⬆ LEVEL ${level}!`, W / 2, H / 2 - 8);
    ctx.font      = '22px Arial';
    ctx.fillStyle = '#88ffcc';
    ctx.fillText(`Difficulty increased! 🔥`, W / 2, H / 2 + 32);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  LEADERBOARD
// ═══════════════════════════════════════════════════════════════
function saveScore() {
  const name    = document.getElementById('nameInput').value.trim() || 'Anonymous';
  const records = JSON.parse(localStorage.getItem('veggieWarriorsLB') || '[]');
  records.push({
    name, score, level,
    hero: heroType,
    date: new Date().toLocaleDateString(),
  });
  records.sort((a, b) => b.score - a.score);
  records.splice(10);
  localStorage.setItem('veggieWarriorsLB', JSON.stringify(records));
  renderLeaderboard();
  showScreen('sLeaderboard');
}

function renderLeaderboard() {
  const records = JSON.parse(localStorage.getItem('veggieWarriorsLB') || '[]');
  const el      = document.getElementById('lbContent');
  if (records.length === 0) {
    el.innerHTML = '<div class="empty-lb">No scores yet — be the first!</div>';
    return;
  }
  const medals  = ['🥇', '🥈', '🥉'];
  const cls     = ['gold', 'silver', 'bronze'];
  el.innerHTML = `
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>Name</th><th>Score</th><th>Level</th><th>Hero</th><th>Date</th>
      </tr></thead>
      <tbody>
        ${records.map((r, i) => `
          <tr>
            <td class="${cls[i] || ''}">${medals[i] || i + 1}</td>
            <td>${r.name}</td>
            <td style="color:#ffdd00;font-weight:bold">${r.score}</td>
            <td>${r.level}</td>
            <td>${r.hero === 'banana' ? '🍌' : '🥦'}</td>
            <td style="color:#555">${r.date}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top)  * (H / r.height);
});

canvas.addEventListener('click', throwSword);

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); throwSword(); }
});

document.addEventListener('keyup', e => { keys[e.key] = false; });

// Initial background render
ctx.fillStyle = '#0d1117';
ctx.fillRect(0, 0, W, H);
ctx.strokeStyle = 'rgba(0,255,136,0.04)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x += 50) {
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
}
for (let y = 0; y < H; y += 50) {
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
}
</script>
